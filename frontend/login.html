<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<h2>تسجيل الدخول</h2>

<form id="loginForm">

<input id="email" type="email" placeholder="البريد الإلكتروني" required>

<input id="password" type="password" placeholder="كلمة المرور" required>

<button type="submit">دخول</button>

</form>

<script>

const supabase = window.supabase.createClient(
"https://rhwzyuqhhrkvjqygpqso.supabase.co",
"sb_publishable_H0e_mY2iZ92z1DUBIPaJ2g_WGvc78-Z"
);

document.getElementById("loginForm").addEventListener("submit", async(e)=>{

e.preventDefault();

const {data,error}=await supabase.auth.signInWithPassword({

email:document.getElementById("email").value,
password:document.getElementById("password").value

});

if(error){

alert(error.message);
return;

}

const role=data.user.user_metadata.role;

if(role==="customer")
location.href="customer-dashboard.html";

else if(role==="provider")
location.href="provider-dashboard.html";

else
location.href="admin-dashboard.html";

});

</script>

</body>
</html>
