<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>إنشاء حساب</h2>

<form id="registerForm">
  <input id="fullname" placeholder="الاسم الكامل" required>
  <input id="phone" placeholder="رقم الهاتف" required>
  <input id="email" type="email" placeholder="البريد الإلكتروني" required>
  <input id="password" type="password" placeholder="كلمة المرور" required>

  <select id="role">
    <option value="customer">عميل</option>
    <option value="provider">مقدم خدمة</option>
  </select>

  <button type="submit">تسجيل</button>
</form>

<script>
const supabase = window.supabase.createClient(
  "https://rhwzyuqhhrkvjqygpqso.supabase.co",
  "sb_publishable_H0e_mY2iZ92z1DUBIPaJ2g_WGvc78-Z"
);

document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const { error } = await supabase.auth.signUp({
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    options: {
      data: {
        full_name: document.getElementById("fullname").value,
        phone: document.getElementById("phone").value,
        role: document.getElementById("role").value
      }
    }
  });

  if (error) {
    alert(error.message);
  } else {
    alert("تم إنشاء الحساب بنجاح");
  }
});
</script>

</body>
</html>
