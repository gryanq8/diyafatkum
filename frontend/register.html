<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>إنشاء حساب</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f4f5f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
width:420px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h2{
text-align:center;
margin-bottom:25px;
color:#8B1E3F;
}

input,
select{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:15px;
background:#8B1E3F;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

a{
display:block;
margin-top:15px;
text-align:center;
text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<h2>إنشاء حساب</h2>

<input
type="text"
placeholder="الاسم الكامل">

<input
type="email"
placeholder="البريد الإلكتروني">

<input
type="tel"
placeholder="رقم الهاتف">

<input
type="password"
placeholder="كلمة المرور">

<select>

<option>

اختر نوع الحساب

</option>

<option>

عميل

</option>

<option>

مقدمة خدمة

</option>

</select>

<button>

إنشاء الحساب

</button>

<a href="login.html">

لديك حساب بالفعل؟

</a>

</div>

</body>

</html>
